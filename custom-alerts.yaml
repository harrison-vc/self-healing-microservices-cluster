apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: custom-alerts
  labels:
    release: prometheus # This tells the Prometheus Operator to pick up these rules
spec:
  groups:
    - name: node-and-pod-alerts
      rules:
        - alert: HighCPUUsage
          expr: (100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m]))
            * 100)) > 50
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Instance CPU usage has been above 50% for 5 minutes"
        - alert: PodFailedToStart
          expr: kube_pod_status_phase{phase=~"Failed|Unknown|Pending"} > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "A Pod in the cluster has failed to start or crashed"
